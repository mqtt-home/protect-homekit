name: Application

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Exposed so the docker-build steps can be skipped on forks (no secrets).
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: app/go.sum

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: app/web
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Test
        working-directory: app
        run: go test ./...

      - name: Build
        working-directory: app
        run: go build .

      # app/Dockerfile FROMs the private pharndt/protect-ffmpeg base image, so
      # this CI build must authenticate to pull it (the release workflow already
      # logs in). Skipped on forks, which have no secrets.
      - name: Log in to DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build docker container
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v7
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: false
          tags: |
            pharndt/protect-homekit:latest
